<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Карточки для слов</title>
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --button: #0f172a;
      --button-text: #ffffff;
      --soft: #f1f5f9;
      --danger: #ef4444;
      --shadow: 0 10px 25px rgba(15, 23, 42, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #e0f2fe 0, var(--bg) 36%);
      color: var(--text);
    }

    main {
      width: min(1000px, calc(100% - 32px));
      margin: 0 auto;
      padding: 40px 0;
    }

    header {
      text-align: center;
      margin-bottom: 28px;
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 6vw, 58px);
      letter-spacing: -0.05em;
      line-height: 1;
    }

    .subtitle {
      margin: 14px auto 0;
      max-width: 650px;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.55;
    }

    .panel {
      background: rgba(255,255,255,0.9);
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 22px;
      backdrop-filter: blur(10px);
      margin-bottom: 28px;
    }

    label {
      display: block;
      font-weight: 700;
      margin-bottom: 10px;
    }

    textarea {
      width: 100%;
      min-height: 150px;
      resize: vertical;
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 16px;
      font: inherit;
      font-size: 16px;
      line-height: 1.5;
      outline: none;
      color: var(--text);
      background: white;
    }

    textarea:focus {
      border-color: #94a3b8;
      box-shadow: 0 0 0 5px rgba(148, 163, 184, 0.22);
    }

    .actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    .hint {
      color: var(--muted);
      font-size: 14px;
    }

    .buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      cursor: pointer;
      border-radius: 999px;
      padding: 12px 16px;
      font: inherit;
      font-weight: 700;
      transition: transform 0.15s ease, opacity 0.15s ease, box-shadow 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.45;
      transform: none;
    }

    .primary {
      background: var(--button);
      color: var(--button-text);
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.18);
    }

    .secondary {
      background: var(--soft);
      color: var(--text);
    }

    .outline {
      background: white;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 14px;
    }

    h2 {
      margin: 0;
      font-size: 24px;
    }

    .counter {
      background: white;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--muted);
      padding: 8px 12px;
      font-size: 14px;
      box-shadow: 0 4px 14px rgba(15, 23, 42, 0.05);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }

    .word-card {
      position: relative;
      min-height: 160px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: 0 6px 18px rgba(15, 23, 42, 0.06);
      padding: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      animation: pop 0.22s ease both;
    }

    .word-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow);
    }

    .word {
      font-size: clamp(24px, 3vw, 34px);
      font-weight: 800;
      line-height: 1.2;
      overflow-wrap: anywhere;
      white-space: pre-wrap;
    }

    .delete {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 36px;
      height: 36px;
      padding: 0;
      border-radius: 50%;
      background: var(--soft);
      color: var(--muted);
      opacity: 0;
    }

    .word-card:hover .delete {
      opacity: 1;
    }

    .delete:hover {
      background: #fee2e2;
      color: var(--danger);
    }

    .empty {
      background: rgba(255,255,255,0.75);
      border: 2px dashed #cbd5e1;
      border-radius: 28px;
      padding: 38px;
      text-align: center;
      color: var(--muted);
    }

    @keyframes pop {
      from {
        opacity: 0;
        transform: scale(0.96) translateY(8px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    @media (max-width: 760px) {
      main {
        width: min(100% - 22px, 1000px);
        padding: 26px 0;
      }

      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .panel {
        padding: 16px;
      }
    }

    @media (max-width: 520px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .actions {
        align-items: stretch;
      }

      .buttons, .buttons button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Карточки для слов</h1>
      <p class="subtitle">Вводи слова или фразы, добавляй карточки и перемешивай порядок для тренировки.</p>
    </header>

    <section class="panel">
      <label for="wordInput">Введи слова</label>
      <textarea id="wordInput" placeholder="Например: house, river, dream&#10;Можно писать через запятую, точку с запятой или с новой строки"></textarea>

      <div class="actions">
        <div class="hint">Ctrl / Cmd + Enter — добавить карточки</div>
        <div class="buttons">
          <button class="primary" id="addButton">Добавить</button>
          <button class="secondary" id="shuffleButton">Шаффл</button>
          <button class="outline" id="clearButton">Очистить</button>
        </div>
      </div>
    </section>

    <section>
      <div class="top-row">
        <h2>Слова</h2>
        <div class="counter" id="counter">0 карточек</div>
      </div>

      <div id="cards"></div>
    </section>
  </main>

  <script>
    const input = document.getElementById("wordInput");
    const addButton = document.getElementById("addButton");
    const shuffleButton = document.getElementById("shuffleButton");
    const clearButton = document.getElementById("clearButton");
    const cardsContainer = document.getElementById("cards");
    const counter = document.getElementById("counter");

    let words = ["apple", "book", "window", "memory", "travel", "bright"];

    function parseInput(text) {
      return text
        .split(/[\\n,;]+/)
        .map(item => item.trim())
        .filter(Boolean);
    }

    function cardWord(count) {
      if (count === 1) return "карточка";
      if (count >= 2 && count <= 4) return "карточки";
      return "карточек";
    }

    function render() {
      counter.textContent = `${words.length} ${cardWord(words.length)}`;
      shuffleButton.disabled = words.length < 2;
      clearButton.disabled = words.length === 0 && input.value.length === 0;

      cardsContainer.innerHTML = "";

      if (words.length === 0) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "Пока нет карточек. Добавь слова выше.";
        cardsContainer.appendChild(empty);
        return;
      }

      const grid = document.createElement("div");
      grid.className = "grid";

      words.forEach((word, index) => {
        const card = document.createElement("article");
        card.className = "word-card";

        const deleteButton = document.createElement("button");
        deleteButton.className = "delete";
        deleteButton.textContent = "×";
        deleteButton.title = "Удалить";
        deleteButton.addEventListener("click", () => {
          words.splice(index, 1);
          render();
        });

        const text = document.createElement("div");
        text.className = "word";
        text.textContent = word;

        card.appendChild(deleteButton);
        card.appendChild(text);
        grid.appendChild(card);
      });

      cardsContainer.appendChild(grid);
    }

    function addWords() {
      const newWords = parseInput(input.value);
      if (newWords.length === 0) return;

      words = [...words, ...newWords];
      input.value = "";
      render();
    }

    function shuffleWords() {
      for (let i = words.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [words[i], words[j]] = [words[j], words[i]];
      }
      render();
    }

    function clearAll() {
      words = [];
      input.value = "";
      render();
    }

    addButton.addEventListener("click", addWords);
    shuffleButton.addEventListener("click", shuffleWords);
    clearButton.addEventListener("click", clearAll);
    input.addEventListener("input", render);
    input.addEventListener("keydown", (event) => {
      if ((event.ctrlKey || event.metaKey) && event.key === "Enter") {
        addWords();
      }
    });

    render();
  </script>
</body>
</html>
