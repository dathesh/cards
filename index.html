<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Карточки с переводом</title>
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --button: #0f172a;
      --button-text: #ffffff;
      --soft: #f1f5f9;
      --danger: #ef4444;
      --shadow: 0 18px 45px rgba(15, 23, 42, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: radial-gradient(circle at top, #dbeafe 0, var(--bg) 38%);
      color: var(--text);
    }

    main {
      width: min(1080px, calc(100% - 28px));
      margin: 0 auto;
      padding: 28px 0 42px;
    }

    header {
      text-align: center;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0;
      font-size: clamp(32px, 6vw, 54px);
      letter-spacing: -0.05em;
      line-height: 1;
    }

    .subtitle {
      margin: 12px auto 0;
      max-width: 760px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.5;
    }

    .layout {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 18px;
      align-items: start;
    }

    .panel {
      background: rgba(255,255,255,0.92);
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: 0 10px 28px rgba(15, 23, 42, 0.07);
      padding: 18px;
      backdrop-filter: blur(10px);
    }

    .study-panel {
      min-height: 560px;
      display: flex;
      flex-direction: column;
    }

    .top-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .counter {
      background: white;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--muted);
      padding: 8px 12px;
      font-size: 14px;
      white-space: nowrap;
    }

    .card-stage {
      flex: 1;
      min-height: 390px;
      perspective: 1400px;
      display: flex;
    }

    .flashcard {
      position: relative;
      width: 100%;
      min-height: 390px;
      border: 0;
      padding: 0;
      background: transparent;
      cursor: pointer;
      text-align: left;
      perspective: 1400px;
    }

    .flashcard-inner {
      position: relative;
      width: 100%;
      min-height: 390px;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform 0.45s ease;
    }

    .flashcard.flipped .flashcard-inner {
      transform: rotateY(180deg);
    }

    .face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 30px;
      box-shadow: var(--shadow);
      padding: 26px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .back {
      transform: rotateY(180deg);
      background: #fefce8;
    }

    .face-label {
      align-self: flex-start;
      margin-bottom: 18px;
      border-radius: 999px;
      background: var(--soft);
      color: var(--muted);
      padding: 7px 11px;
      font-size: 13px;
      font-weight: 700;
    }

    .back .face-label {
      background: #fef3c7;
      color: #92400e;
    }

    .card-text {
      flex: 1;
      overflow: auto;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      font-size: clamp(19px, 3vw, 30px);
      line-height: 1.35;
      font-weight: 700;
      letter-spacing: -0.02em;
      font-family: Arial, Helvetica, sans-serif;
    }

    .study-buttons {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    button {
      border: 0;
      cursor: pointer;
      border-radius: 999px;
      padding: 12px 14px;
      font: inherit;
      font-weight: 800;
      transition: transform 0.15s ease, opacity 0.15s ease, box-shadow 0.15s ease;
    }

    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(0); }
    button:disabled { cursor: not-allowed; opacity: 0.45; transform: none; }

    .primary {
      background: var(--button);
      color: var(--button-text);
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.18);
    }

    .secondary { background: var(--soft); color: var(--text); }
    .outline { background: white; color: var(--text); border: 1px solid var(--border); }
    .danger { background: #fee2e2; color: #991b1b; }

    label {
      display: block;
      font-weight: 800;
      margin: 12px 0 8px;
    }

    label:first-child { margin-top: 0; }

    textarea {
      width: 100%;
      min-height: 105px;
      resize: vertical;
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 12px;
      font: inherit;
      font-size: 15px;
      line-height: 1.45;
      outline: none;
      color: var(--text);
      background: white;
    }

    textarea:focus {
      border-color: #93c5fd;
      box-shadow: 0 0 0 5px rgba(37, 99, 235, 0.12);
    }

    .side-buttons {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .small-note {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
      margin-top: 10px;
    }

    .list {
      display: grid;
      gap: 10px;
      margin-top: 14px;
      max-height: 285px;
      overflow: auto;
      padding-right: 4px;
    }

    .mini-card {
      border: 1px solid var(--border);
      background: white;
      border-radius: 18px;
      padding: 12px;
      display: grid;
      gap: 8px;
    }

    .mini-front {
      font-weight: 800;
      font-size: 14px;
      line-height: 1.35;
      max-height: 58px;
      overflow: hidden;
    }

    .mini-back {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
      max-height: 54px;
      overflow: hidden;
    }

    .mini-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .mini-actions button {
      padding: 8px 10px;
      font-size: 13px;
    }

    .empty {
      width: 100%;
      border: 2px dashed #cbd5e1;
      background: rgba(255,255,255,0.7);
      border-radius: 28px;
      padding: 32px;
      text-align: center;
      color: var(--muted);
      line-height: 1.5;
    }

    @media (max-width: 860px) {
      .layout { grid-template-columns: 1fr; }
      .study-buttons { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 520px) {
      main { width: min(100% - 18px, 1080px); }
      .panel { padding: 14px; border-radius: 22px; }
      .face { padding: 20px; border-radius: 24px; }
      .study-buttons { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Карточки с переводом</h1>
      <p class="subtitle">Карточки показываются по очереди. Нажми на карточку, чтобы увидеть перевод. Можно добавлять свои карточки, перемешивать и сохранять на устройстве.</p>
    </header>

    <div class="layout">
      <section class="panel study-panel">
        <div class="top-row">
          <div class="counter" id="counter">0 / 0</div>
          <div class="counter">Английский → Русский</div>
        </div>

        <div class="card-stage" id="cardStage"></div>

        <div class="study-buttons">
          <button class="outline" id="prevButton">Назад</button>
          <button class="primary" id="flipButton">Перевернуть</button>
          <button class="outline" id="nextButton">Дальше</button>
          <button class="secondary" id="shuffleButton">Шаффл</button>
        </div>
      </section>

      <aside class="panel">
        <label for="frontInput">Передняя сторона</label>
        <textarea id="frontInput" placeholder="Английский текст"></textarea>

        <label for="backInput">Обратная сторона</label>
        <textarea id="backInput" placeholder="Перевод"></textarea>

        <div class="side-buttons">
          <button class="primary" id="addButton">Добавить карточку</button>
          <button class="secondary" id="resetButton">Вернуть карточки из текста</button>
          <button class="danger" id="clearButton">Удалить все карточки</button>
        </div>

        <div class="small-note">
          Сохранение работает на этом устройстве. Кавычки отображаются обычными символами: "example".
        </div>

        <div class="list" id="cardList"></div>
      </aside>
    </div>
  </main>

  <script>
    const INITIAL_CARDS = [
  {
    "front": "The headline of the article is \"Performance evaluation of the prospects and challenges of effective power generation and distribution in Nigeria\".",
    "back": "Заголовок статьи — «Оценка перспектив и проблем эффективного производства и распределения электроэнергии в Нигерии»."
  },
  {
    "front": "The authors of the article are Anthony U. Adoghe, Temitope M. Adeyemi-Kayode, Victoria Oguntosin and Irene I. Amahia.",
    "back": "Авторами статьи являются Anthony U. Adoghe, Temitope M. Adeyemi-Kayode, Victoria Oguntosin и Irene I. Amahia."
  },
  {
    "front": "The article comes up from the journal \"Energy Reports\".",
    "back": "Статья опубликована в журнале «Energy Reports»."
  },
  {
    "front": "The article is dated in 2022.",
    "back": "Статья датирована 2022 годом."
  },
  {
    "front": "The article lies in the field of electrical engineering and energy systems.",
    "back": "Статья относится к области электротехники и энергетических систем."
  },
  {
    "front": "It concerns the points of power generation, distribution and sector reforms in Nigeria.",
    "back": "Она касается вопросов производства электроэнергии, распределения и реформ энергетического сектора в Нигерии."
  },
  {
    "front": "The main idea of the article is to evaluate the growth of the Nigerian power sector from 1898 to the present.",
    "back": "Главная идея статьи — оценить развитие энергетического сектора Нигерии с 1898 года до настоящего времени."
  },
  {
    "front": "The article deals with a question of paramount importance about identifying challenges and prospects for effective power generation and distribution in Nigeria.",
    "back": "Статья рассматривает вопрос первостепенной важности: выявление проблем и перспектив эффективного производства и распределения электроэнергии в Нигерии."
  },
  {
    "front": "The article opens with a general statement that Nigeria generates 4500 MW for a population of 200 million people.",
    "back": "Статья начинается с общего утверждения о том, что Нигерия производит 4500 МВт электроэнергии для населения численностью 200 миллионов человек."
  },
  {
    "front": "At the beginning of the article the author states, that more than 50% of the population has no electricity access.",
    "back": "В начале статьи автор утверждает, что более 50% населения не имеет доступа к электричеству."
  },
  {
    "front": "Further on, the article highlights the problem of inefficient evacuation of generated power.",
    "back": "Далее в статье подчёркивается проблема неэффективной передачи произведённой электроэнергии."
  },
  {
    "front": "After that, the author focuses on the history of the Nigerian power sector from 1898 to the present.",
    "back": "После этого автор сосредоточивает внимание на истории энергетического сектора Нигерии с 1898 года до настоящего времени."
  },
  {
    "front": "The author brings to the forefront the problem of challenges such as poor maintenance, lack of investment and energy losses.",
    "back": "Автор выдвигает на первый план такие проблемы, как плохое техническое обслуживание, недостаток инвестиций и потери энергии."
  },
  {
    "front": "The article describes the Electric Power Sector Reform of 2005 and its outcomes.",
    "back": "В статье описывается реформа электроэнергетического сектора 2005 года и её результаты."
  },
  {
    "front": "The author informs us about key challenges including customer issues, financial challenges and energy losses.",
    "back": "Автор сообщает о ключевых проблемах, включая проблемы потребителей, финансовые трудности и потери энергии."
  },
  {
    "front": "The author draws a conclusion saying that distributed generation and smart metering systems are viable solutions.",
    "back": "Автор приходит к выводу, что распределённая генерация и системы умного учёта являются жизнеспособными решениями."
  },
  {
    "front": "I find the article interesting, informative and topical.",
    "back": "Я считаю статью интересной, информативной и актуальной."
  },
  {
    "front": "The article is aimed to acquaint the readers with the strengths, weaknesses, opportunities and threats of the Nigerian power sector.",
    "back": "Статья направлена на то, чтобы познакомить читателей с сильными и слабыми сторонами, возможностями и угрозами энергетического сектора Нигерии."
  },
  {
    "front": "The author is absolutely right saying that the Nigerian energy market is telescopic in nature.",
    "back": "Автор абсолютно прав, говоря, что энергетический рынок Нигерии имеет телескопический характер."
  },
  {
    "front": "The author, to my mind, provides convincing evidence that distributed generation per Local Government Area could improve power supply.",
    "back": "На мой взгляд, автор приводит убедительные доказательства того, что распределённая генерация в каждом районе местного самоуправления могла бы улучшить электроснабжение."
  },
  {
    "front": "The article is intended for a wide range of readers interested in power sector development and energy policy.",
    "back": "Статья предназначена для широкого круга читателей, интересующихся развитием энергетического сектора и энергетической политикой."
  }
];

    const STORAGE_KEY = "unnumberedTextFlashcardsV1";
    const cardStage = document.getElementById("cardStage");
    const counter = document.getElementById("counter");
    const frontInput = document.getElementById("frontInput");
    const backInput = document.getElementById("backInput");
    const addButton = document.getElementById("addButton");
    const resetButton = document.getElementById("resetButton");
    const clearButton = document.getElementById("clearButton");
    const shuffleButton = document.getElementById("shuffleButton");
    const prevButton = document.getElementById("prevButton");
    const nextButton = document.getElementById("nextButton");
    const flipButton = document.getElementById("flipButton");
    const cardList = document.getElementById("cardList");

    let cards = loadCards();
    let currentIndex = 0;
    let flipped = false;

    function loadCards() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (!saved) return [...INITIAL_CARDS];
        const parsed = JSON.parse(saved);
        if (!Array.isArray(parsed)) return [...INITIAL_CARDS];

        return parsed
          .filter(card => card && typeof card.front === "string" && typeof card.back === "string")
          .map(card => ({ front: card.front, back: card.back }));
      } catch {
        return [...INITIAL_CARDS];
      }
    }

    function saveCards() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(cards));
    }

    function clampIndex() {
      if (cards.length === 0) {
        currentIndex = 0;
        flipped = false;
        return;
      }
      if (currentIndex < 0) currentIndex = 0;
      if (currentIndex >= cards.length) currentIndex = cards.length - 1;
    }

    function render() {
      clampIndex();

      counter.textContent = cards.length ? `${currentIndex + 1} / ${cards.length}` : "0 / 0";
      prevButton.disabled = cards.length < 2;
      nextButton.disabled = cards.length < 2;
      shuffleButton.disabled = cards.length < 2;
      flipButton.disabled = cards.length === 0;

      renderStudyCard();
      renderList();
    }

    function renderStudyCard() {
      cardStage.innerHTML = "";

      if (cards.length === 0) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "Пока нет карточек. Добавь карточку справа или верни карточки из текста.";
        cardStage.appendChild(empty);
        return;
      }

      const card = cards[currentIndex];

      const button = document.createElement("button");
      button.className = "flashcard" + (flipped ? " flipped" : "");
      button.type = "button";
      button.addEventListener("click", flipCard);

      const inner = document.createElement("div");
      inner.className = "flashcard-inner";

      const front = document.createElement("div");
      front.className = "face front";

      const frontLabel = document.createElement("div");
      frontLabel.className = "face-label";
      frontLabel.textContent = "Английский";

      const frontText = document.createElement("div");
      frontText.className = "card-text";
      frontText.textContent = card.front;

      front.appendChild(frontLabel);
      front.appendChild(frontText);

      const back = document.createElement("div");
      back.className = "face back";

      const backLabel = document.createElement("div");
      backLabel.className = "face-label";
      backLabel.textContent = "Перевод";

      const backText = document.createElement("div");
      backText.className = "card-text";
      backText.textContent = card.back;

      back.appendChild(backLabel);
      back.appendChild(backText);

      inner.appendChild(front);
      inner.appendChild(back);
      button.appendChild(inner);
      cardStage.appendChild(button);
    }

    function renderList() {
      cardList.innerHTML = "";

      cards.forEach((card, index) => {
        const item = document.createElement("div");
        item.className = "mini-card";

        const front = document.createElement("div");
        front.className = "mini-front";
        front.textContent = card.front;

        const back = document.createElement("div");
        back.className = "mini-back";
        back.textContent = card.back;

        const actions = document.createElement("div");
        actions.className = "mini-actions";

        const open = document.createElement("button");
        open.className = "secondary";
        open.textContent = "Открыть";
        open.addEventListener("click", () => {
          currentIndex = index;
          flipped = false;
          render();
        });

        const remove = document.createElement("button");
        remove.className = "danger";
        remove.textContent = "Удалить";
        remove.addEventListener("click", () => {
          cards.splice(index, 1);
          if (currentIndex >= cards.length) currentIndex = Math.max(0, cards.length - 1);
          flipped = false;
          saveCards();
          render();
        });

        actions.appendChild(open);
        actions.appendChild(remove);

        item.appendChild(front);
        item.appendChild(back);
        item.appendChild(actions);
        cardList.appendChild(item);
      });
    }

    function addCard() {
      const front = frontInput.value.trim();
      const back = backInput.value.trim();

      if (!front || !back) return;

      cards.push({ front, back });
      currentIndex = cards.length - 1;
      flipped = false;
      saveCards();

      frontInput.value = "";
      backInput.value = "";
      render();
    }

    function resetCards() {
      cards = [...INITIAL_CARDS];
      currentIndex = 0;
      flipped = false;
      saveCards();
      render();
    }

    function clearCards() {
      cards = [];
      currentIndex = 0;
      flipped = false;
      saveCards();
      render();
    }

    function shuffleCards() {
      for (let i = cards.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [cards[i], cards[j]] = [cards[j], cards[i]];
      }
      currentIndex = 0;
      flipped = false;
      saveCards();
      render();
    }

    function flipCard() {
      flipped = !flipped;
      renderStudyCard();
    }

    function nextCard() {
      if (cards.length === 0) return;
      currentIndex = (currentIndex + 1) % cards.length;
      flipped = false;
      render();
    }

    function prevCard() {
      if (cards.length === 0) return;
      currentIndex = (currentIndex - 1 + cards.length) % cards.length;
      flipped = false;
      render();
    }

    addButton.addEventListener("click", addCard);
    resetButton.addEventListener("click", resetCards);
    clearButton.addEventListener("click", clearCards);
    shuffleButton.addEventListener("click", shuffleCards);
    nextButton.addEventListener("click", nextCard);
    prevButton.addEventListener("click", prevCard);
    flipButton.addEventListener("click", flipCard);

    document.addEventListener("keydown", (event) => {
      if (event.target.tagName === "TEXTAREA") {
        if ((event.ctrlKey || event.metaKey) && event.key === "Enter") {
          addCard();
        }
        return;
      }

      if (event.key === "ArrowRight") nextCard();
      if (event.key === "ArrowLeft") prevCard();
      if (event.key === " " || event.key === "Enter") {
        event.preventDefault();
        flipCard();
      }
    });

    render();
  </script>
</body>
</html>
